<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Register | AutoGrade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0e17;--card:#161d2e;--accent:#4ade80;--accent2:#22d3ee;--text:#e2e8f0;--muted:#64748b;--border:#1e293b;--surface:#111827}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(74,222,128,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}.box{position:relative;z-index:1;width:100%;max-width:480px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem}.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;text-align:center;margin-bottom:.4rem}.logo span{color:var(--accent)}.sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:1.8rem}.r2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.fg{margin-bottom:.95rem}label{display:block;font-size:.78rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}input,select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:.72rem 1rem;font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}input:focus{border-color:var(--accent)}.role-toggle{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}.ro{display:none}.rl{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:500;transition:all .15s}.ro:checked+.rl.t{border-color:var(--accent2);background:rgba(34,211,238,.1);color:var(--accent2)}.ro:checked+.rl.s{border-color:var(--accent);background:rgba(74,222,128,.1);color:var(--accent)}.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem}.btn{width:100%;background:var(--accent);color:#0a0e17;border:none;padding:.85rem;border-radius:8px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem}.fl{text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted)}.fl a{color:var(--accent);text-decoration:none}</style></head>
<body><div class="box"><div class="logo">Auto<span>Grade</span></div><div class="sub">Create your account</div>
{% with msgs=get_flashed_messages(with_categories=true) %}{% for cat,msg in msgs %}<div class="error">{{ msg }}</div>{% endfor %}{% endwith %}
<form method="post"><div class="fg"><label>I am a...</label><div class="role-toggle"><input type="radio" name="role" value="teacher" id="rt" class="ro"><label for="rt" class="rl t">&#128105;&#8205;&#127979; Teacher</label><input type="radio" name="role" value="student" id="rs" class="ro" checked><label for="rs" class="rl s">&#127891; Student</label></div></div>
<div class="r2"><div class="fg"><label>First Name</label><input type="text" name="first_name" placeholder="Asha"></div><div class="fg"><label>Last Name</label><input type="text" name="last_name" placeholder="Sharma"></div></div>
<div class="fg"><label>Username</label><input type="text" name="username" placeholder="asha_s" required autofocus></div>
<div class="fg"><label>Email</label><input type="email" name="email" placeholder="asha@example.com" required></div>
<div class="r2"><div class="fg"><label>Password</label><input type="password" name="password" placeholder="Min 4 chars" required></div><div class="fg"><label>Confirm</label><input type="password" name="password2" placeholder="Repeat" required></div></div>
<button type="submit" class="btn">Create Account &#8594;</button></form>
<div class="fl">Already have an account? <a href="/login">Sign in</a></div></div></body></html>
