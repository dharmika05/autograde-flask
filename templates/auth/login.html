<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Login | AutoGrade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0e17;--card:#161d2e;--accent:#4ade80;--text:#e2e8f0;--muted:#64748b;--border:#1e293b;--surface:#111827}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(74,222,128,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}.box{position:relative;z-index:1;width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem}.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;text-align:center;margin-bottom:.4rem}.logo span{color:var(--accent)}.sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:2rem}.fg{margin-bottom:1.1rem}label{display:block;font-size:.78rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:.75rem 1rem;font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}input:focus{border-color:var(--accent)}.btn{width:100%;background:var(--accent);color:#0a0e17;border:none;padding:.85rem;border-radius:8px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem}.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem}.fl{text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted)}.fl a{color:var(--accent);text-decoration:none}</style></head>
<body><div class="box"><div class="logo">Auto<span>Grade</span></div><div class="sub">Sign in to your account</div>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post"><div class="fg"><label>Username</label><input type="text" name="username" placeholder="Enter username" required autofocus></div><div class="fg"><label>Password</label><input type="password" name="password" placeholder="Enter password" required></div><button type="submit" class="btn">Sign In &#8594;</button></form>
<div class="fl">Don't have an account? <a href="/register">Register here</a></div></div></body></html>
